name: Deploy to GitHub Pages

on:
  workflow_dispatch:

# 设置部署权限
permissions:
  contents: read          # 检出代码需要
  pages: write            # 部署到 Pages 需要
  id-token: write         # 使用 OIDC 认证（官方推荐）

# 只允许一个并发部署，避免部署冲突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all apps
        run: npm run build


      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist   # 你的构建输出目录

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4